{% load static %}
<!DOCTYPE html>

<html lang="en" data-bs-theme="dark">

<head>
    <meta charset=" UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>
        {% block title %}
        ABHAY
        {% endblock %}
    </title>
</head>

<body style="background-color: #121212; color: white;">
    <nav class="navbar navbar-expand-lg border-bottom border-dark mb-4">
        <div class="container">
            <a class="navbar-brand text-warning fw-bold" href="{% url 'tweet_list' %}">GOLU APP</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'tweet_list' %}">All Tweets</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    {% if user.is_authenticated %}
                        <span class="navbar-text me-3 text-light">Welcome, @{{ user.username }}!</span>
                        <a href="{% url 'tweet_create' %}" class="btn btn-outline-warning me-2">Tweet</a>
                        <form method="post" action="{% url 'logout' %}">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger">Logout</button>
                        </form>
                    {% else %}
                        <a href="{% url 'login' %}" class="btn btn-outline-primary me-2">Login</a>
                        <a href="{% url 'register' %}" class="btn btn-primary">Register</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>

</html>
