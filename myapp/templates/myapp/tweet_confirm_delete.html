{% extends 'layout.html' %}

{% block title %}
Confirm Delete
{% endblock %}

{% block content %}
<div class="container mt-5 mb-5 text-center">
    <h1 class="text-center fw-bold text-danger">Delete Tweet</h1>
    <div class="row justify-content-center mt-4">
        <div class="col-md-6">
            <div class="card bg-dark text-light border-secondary">
                <div class="card-body">
                    <h5 class="card-title">Are you sure you want to delete this tweet?</h5>
                    <p class="card-text text-muted mt-3">"{{ tweet.text }}"</p>
                    <form method="post" class="mt-4">
                        {% csrf_token %}
                        <button class="btn btn-danger w-100 mb-2" type="submit">Confirm Delete</button>
                        <a href="{% url 'tweet_list' %}" class="btn btn-secondary w-100">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
