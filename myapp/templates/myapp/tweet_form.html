{% extends 'layout.html' %}

{% block title %}
Create / Edit Tweet
{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1 class="text-center fw-bold text-warning mb-4">
                {% if form.instance.pk %}
                Edit Tweet
                {% else %}
                Create Tweet
                {% endif %}
            </h1>
            <div class="card p-4 shadow">
                <form action="" method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-warning w-100 fw-bold mt-2">Submit</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
