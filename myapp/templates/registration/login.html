{% extends 'layout.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <h2 class="text-center fw-bold text-primary mb-4">Login to TweetApp</h2>
            <div class="card bg-dark text-light border-secondary">
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button class="btn btn-primary w-100 mt-3 fw-bold" type="submit">Login</button>
                    </form>
                    <div class="mt-4 text-center">
                        <p class="text-muted">Don't have an account? <a href="{% url 'register' %}" class="text-primary text-decoration-none">Register here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
